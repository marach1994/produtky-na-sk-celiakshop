name: Kontrola sezónních kategorií

on:
  schedule:
    - cron: "0 7 * * *"  # každý den v 8:00 CET (UTC+1)
  workflow_dispatch:       # manuální spuštění z GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python check_seasonal.py
        env:
          FREELO_USER: ${{ secrets.FREELO_USER }}
          FREELO_TOKEN: ${{ secrets.FREELO_TOKEN }}
